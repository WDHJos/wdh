<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Publications</title>
  <link rel="stylesheet" href="style.css">

  <style>
  table {
    border-collapse: collapse;
    font-size: 12px;
    min-width: 1200px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: left;
    vertical-align: top;
    white-space: nowrap;
  }

  th {
    position: sticky;
    top: 0;
    background: #f2f2f2;
    z-index: 2;
  }

  /* scroll container */
  #table {
    display: block;
    overflow-x: auto;
    max-width: 100%;
  }

  /* detail tabel */
  #detail table {
    border-collapse: collapse;
    margin-top: 10px;
  }

  #detail th, #detail td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
  }

  #detail th {
    background: #f2f2f2;
    width: 200px;
  }
  </style>

</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="bibliography.html">Bibliography</a>
  <a href="publications.html">Publications</a>
</nav>

<h1>Publications</h1>

<input type="text" id="search" placeholder="Search publications...">

<br><br>

<table id="table"></table>

<div id="detail"></div>

<script>
let tableData = [];
let headers = [];

fetch("publications.csv")
  .then(response => response.text())
  .then(text => {

    const delimiter = text.includes(";") ? ";" : ",";
    const lines = text.trim().split("\n");

    const rows = lines.map(line => {
      return line.split(delimiter).map(cell => cell.replace(/^"|"$/g, ""));
    });

    headers = rows[0];
    tableData = rows.slice(1);

    renderTable(tableData);

    document.getElementById("search").addEventListener("keyup", function() {
      const value = this.value.toLowerCase();
      const filtered = tableData.filter(row =>
        row.join(" ").toLowerCase().includes(value)
      );
      renderTable(filtered);
    });

  });

function renderTable(rows) {
  let html = "<tr>";

  headers.forEach(h => html += "<th>" + h + "</th>");
  html += "</tr>";

  rows.forEach((row, index) => {
    html += "<tr onclick='showDetail(" + index + ")'>";
    row.forEach(cell => {
      html += "<td>" + cell + "</td>";
    });
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
}

function showDetail(index) {
  const row = tableData[index];

  let html = "<h2>Detail</h2><table>";

  headers.forEach((h, i) => {
    html += "<tr>";
    html += "<th>" + h + "</th>";
    html += "<td>" + (row[i] || "") + "</td>";
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("detail").innerHTML = html;
}
</script>

</body>
</html>
