<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Publications</title>

<style>
body {
  font-family: Arial;
}

table {
  border-collapse: collapse;
  font-size: 12px;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: left;
  vertical-align: top;
  white-space: normal;
  overflow-wrap: break-word;
}

/* HEADER BASIS */
th {
  height: 130px;
  background: #f2f2f2;
  position: sticky;
  top: 0;
  padding: 0;
  vertical-align: bottom;
}

/* horizontaal */
th.horiz {
  padding: 4px;
}

/* 40 graden */
th.rot40 span {
  display: inline-block;
  transform: rotate(-40deg);
  transform-origin: left bottom;
  margin-left: 5px;
}

/* verticale headers (CORRECT) */
th.vert {
  position: relative;
  width: 40px;
}

th.vert span {
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%) rotate(90deg);
  transform-origin: center;
  white-space: nowrap;
}

/* kolombreedtes */
th:nth-child(1), td:nth-child(1) { width: 40px; }
th:nth-child(2), td:nth-child(2) { width: 260px; }
th:nth-child(3), td:nth-child(3) { width: 160px; }
th:nth-child(4), td:nth-child(4) { width: 45px; }
th:nth-child(5), td:nth-child(5) { width: 80px; }
th:nth-child(6), td:nth-child(6) { width: 160px; }
th:nth-child(7), td:nth-child(7) { width: 80px; }
th:nth-child(8), td:nth-child(8) { width: 80px; }

/* laatste kolommen compact */
th:nth-child(n+9), td:nth-child(n+9) {
  width: 40px;
  text-align: center;
}

/* scroll */
.table-container {
  overflow-x: auto;
}
</style>

</head>
<body>

<h1>Publications</h1>

<div class="table-container">

<table>

<tr>
  <th class="vert"><span>PUB ID</span></th>
  <th class="horiz">TITLE</th>
  <th class="horiz">AUTHORS</th>
  <th class="horiz">YEAR</th>
  <th class="rot40"><span>LANGUAGE</span></th>
  <th class="horiz">SOURCE</th>
  <th class="rot40"><span>URL</span></th>
  <th class="rot40"><span>DOI</span></th>
  <th class="vert"><span>OVERALL</span></th>
  <th class="vert"><span>DETERMINANT</span></th>
  <th class="vert"><span>CONCEQUENCE</span></th>
  <th class="vert"><span>HEDONIC</span></th>
  <th class="vert"><span>CONTENT</span></th>
  <th class="vert"><span>CONTAINS DATA</span></th>
</tr>

<tr>
  <td>1</td>
  <td>Glücksvorstellungen: Ein Rückgriff in die Geschichte der Soziologie</td>
  <td>Bellebaum, A.</td>
  <td>2000</td>
  <td>German</td>
  <td>Example Source</td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
</tr>

</table>

</div>

</body>
</html>
