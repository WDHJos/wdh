<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WDH Publications</title>
<style>
  :root {
    --nav-h: 48px;
    --controls-h: 126px;
    --border: #d4d9df;
    --light: #f7f9fb;
    --blue: #0b67c2;
    --sticky-col1-width: 70px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    color: #1f2933;
    background: white;
  }
  .topnav {
    position: sticky;
    top: 0;
    z-index: 50;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #d9ecff;
    border-bottom: 1px solid #b7d5f5;
  }
  .topnav a {
    text-decoration: none;
    color: #073b70;
    font-weight: 700;
    padding: 8px 12px;
    border-radius: 6px;
  }
  .topnav a.active, .topnav a:hover {
    background: white;
  }
  .page {
    padding: 14px;
  }
  h1 {
    margin: 8px 0 12px 0;
    font-size: 22px;
  }
  .controls {
    position: sticky;
    top: var(--nav-h);
    z-index: 40;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .control-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(210px, 1fr));
    gap: 8px;
    align-items: end;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 3px;
    color: #3a4652;
  }
  input, select, button {
    font: inherit;
    padding: 7px 8px;
    border: 1px solid #bfc7d1;
    border-radius: 6px;
    background: white;
    min-height: 34px;
  }
  input, select { width: 100%; }
  button {
    cursor: pointer;
    background: #f4f7fa;
  }
  button:hover { background: #e8f1fb; }
  .small-actions {
    display: flex;
    gap: 8px;
  }
  .status {
    margin-top: 8px;
    font-size: 13px;
    color: #46515c;
  }
  .table-shell {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: white;
  }
  .table-scroll {
    width: 100%;
    max-height: calc(100vh - 235px);
    overflow: auto;
    position: relative;
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
    min-width: max-content;
  }
  thead th {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #eef5fc;
    border-bottom: 1px solid #9eb8d2;
    border-right: 1px solid var(--border);
    padding: 6px 5px;
    text-align: left;
    vertical-align: bottom;
    font-size: 12px;
    line-height: 1.12;
    white-space: normal;
    overflow-wrap: anywhere;
  }
  tbody td {
    border-bottom: 1px solid #edf0f3;
    border-right: 1px solid #edf0f3;
    padding: 5px 6px;
    vertical-align: top;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.25;
    height: auto;
  }
  tbody tr:nth-child(even) { background: #fbfcfd; }
  tbody tr:hover { background: #fff9df; cursor: pointer; }
  td.wrap {
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    overflow-wrap: anywhere;
  }
  td.center { text-align: center; }

  th.sticky-col-1, td.sticky-col-1 {
    position: sticky;
    left: 0;
    z-index: 32;
    background: white;
    box-shadow: 2px 0 4px rgba(0,0,0,.10);
  }
  th.sticky-col-2, td.sticky-col-2 {
    position: sticky;
    left: var(--sticky-col1-width);
    z-index: 31;
    background: white;
    box-shadow: 2px 0 4px rgba(0,0,0,.10);
  }
  thead th.sticky-col-1, thead th.sticky-col-2 {
    z-index: 45;
    background: #dcecf8;
  }
  tbody tr:nth-child(even) td.sticky-col-1,
  tbody tr:nth-child(even) td.sticky-col-2 {
    background: #fbfcfd;
  }
  tbody tr:hover td.sticky-col-1,
  tbody tr:hover td.sticky-col-2 {
    background: #fff9df;
  }
  a.linkword {
    color: var(--blue);
    text-decoration: underline;
    font-weight: 600;
  }
  .pagination {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 8px;
    border-top: 1px solid var(--border);
    background: #fafbfc;
  }
  .pagination button {
    min-width: 34px;
    padding: 5px 8px;
  }
  .pagination button.active {
    background: #0b67c2;
    color: white;
    border-color: #0b67c2;
  }
  .modal-backdrop {
    display: none;
    position: fixed;
    z-index: 100;
    inset: 0;
    background: rgba(0,0,0,.35);
    padding: 30px;
  }
  .modal {
    max-width: 920px;
    max-height: 88vh;
    overflow: auto;
    margin: 0 auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 10px 28px rgba(0,0,0,.28);
  }
  .modal-header {
    position: sticky;
    top: 0;
    background: #eef5fc;
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .modal-header h2 {
    font-size: 18px;
    margin: 0;
    line-height: 1.25;
  }
  .modal-close {
    min-width: 38px;
    font-weight: bold;
  }
  .modal-body {
    padding: 12px 14px 16px;
  }
  .detail-table {
    width: 100%;
    min-width: auto;
    table-layout: fixed;
    border-collapse: collapse;
  }
  .detail-table th {
    width: 210px;
    text-align: left;
    vertical-align: top;
    padding: 7px;
    background: #f5f7fa;
    border: 1px solid var(--border);
  }
  .detail-table td {
    padding: 7px;
    border: 1px solid var(--border);
    white-space: normal;
    overflow-wrap: anywhere;
  }
  @media (max-width: 900px) {
    .control-grid { grid-template-columns: 1fr; }
    .table-scroll { max-height: calc(100vh - 390px); }
  }
</style>
</head>
<body>
<nav class="topnav">
  <a href="index.html">HOME</a>
  <a href="bibliography.html">BIBLIOGRAPHY</a>
  <a href="publications.html" class="active">PUBLICATIONS</a>
</nav>

<main class="page">
  <h1>WDH Publications</h1>

  <section class="controls">
    <div class="control-grid">
      <div>
        <label for="authorStart">Auteur: begint met hoofdauteur</label>
        <input id="authorStart" placeholder="bijv. Ott">
      </div>
      <div>
        <label for="authorContains">Auteur: bevat</label>
        <input id="authorContains" placeholder="bijv. veenhoven">
      </div>
      <div>
        <label for="titleSearch">Titel: woord of woordcombinatie</label>
        <input id="titleSearch" placeholder="bijv. subjective well-being">
      </div>
      <div>
        <label for="subjectSearch">Subject descriptions: zoek in Subject_1 t/m Subject_5</label>
        <input id="subjectSearch" placeholder="bijv. measurement of happiness">
      </div>
      <div>
        <label for="sortCol">Sorteer kolom</label>
        <select id="sortCol"></select>
      </div>
      <div>
        <label for="sortDir">Sorteerrichting</label>
        <select id="sortDir">
          <option value="asc">A-Z / 0-9</option>
          <option value="desc">Z-A / 9-0</option>
        </select>
      </div>
      <div class="small-actions">
        <button id="applyBtn">Toepassen</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>
    <div class="status" id="status"></div>
  </section>

  <section class="table-shell">
    <div class="table-scroll" id="tableScroll">
      <table id="pubTable">
        <thead><tr id="theadRow"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>
</main>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2 id="modalTitle">Publicatie details</h2>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="publications_data.js"></script>
<script>
const HEADERS = ["PubId", "TITLE ORIGINAL", "TITLE ENGLISH TRANSLATED", "AUTHORS", "PUBLICTION YEAR", "LANGUAGE", "SOURCE", "URL", "DOI", "INPUTDATE", "REMARKS", "DETERMINANT", "CONCEQUENSE", "CONTENTMENT", "OVERALL", "HEDONIC", "CONTAINSDATA", "Subject_1", "Subject_2", "Subject_3", "Subject_4", "Subject_5"];
const VISIBLE_HEADERS = ["PubId", "TITLE ORIGINAL", "TITLE ENGLISH TRANSLATED", "AUTHORS", "PUBLICTION YEAR", "URL", "DOI", "DETERMINANT", "CONCEQUENSE", "CONTENTMENT", "OVERALL", "HEDONIC", "CONTAINSDATA", "Subject_1", "Subject_2", "Subject_3", "Subject_4", "Subject_5"];
const WIDTHS = {"PubId": 90, "TITLE ORIGINAL": 360, "TITLE ENGLISH TRANSLATED": 360, "AUTHORS": 240, "PUBLICTION YEAR": 90, "LANGUAGE": 104, "SOURCE": 86, "URL": 70, "DOI": 70, "INPUTDATE": 149, "REMARKS": 96, "DETERMINANT": 126, "CONCEQUENSE": 128, "CONTENTMENT": 130, "OVERALL": 91, "HEDONIC": 94, "CONTAINSDATA": 132, "Subject_1": 210, "Subject_2": 210, "Subject_3": 210, "Subject_4": 210, "Subject_5": 210};
const HIDDEN_DETAIL = new Set(["LANGUAGE","SOURCE","INPUTDATE","REMARKS"]);
const SUBJECT_COLUMNS = ["Subject_1","Subject_2","Subject_3","Subject_4","Subject_5"];
const PAGE_SIZE = 50;

let filtered = [...DATA];
let page = 1;

function norm(s) {
  return String(s ?? "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function normNoSpace(s) {
  return norm(s).replace(/\s+/g, "");
}
function asNumber(v) {
  const n = Number(String(v ?? "").replace(",", "."));
  return Number.isFinite(n) ? n : null;
}
function getMainAuthor(v) {
  return String(v ?? "").split(";")[0] || "";
}
function hasUrl(v) {
  const s = String(v ?? "").trim();
  return /^https?:\/\//i.test(s) || /^doi:/i.test(s) || /^10\.\d{4,9}\//.test(s);
}
function doiToUrl(v) {
  let s = String(v ?? "").trim();
  if (!s) return "";
  if (/^https?:\/\//i.test(s)) return s;
  s = s.replace(/^doi:\s*/i, "");
  return "https://doi.org/" + encodeURIComponent(s).replace(/%2F/g,"/");
}
function headerHtml(h) {
  return String(h).replace(/_/g, " ").split(/\s+/).map(escapeHtml).join("<br>");
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
}
function cellHtml(h, v) {
  if ((h === "URL" || h === "DOI") && String(v ?? "").trim()) {
    const href = h === "DOI" ? doiToUrl(v) : String(v).trim();
    return `<a class="linkword" href="${escapeHtml(href)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">link</a>`;
  }
  return escapeHtml(v);
}

function updateStickyColumns() {
  const firstHeader = document.querySelector('#theadRow th.sticky-col-1');
  if (!firstHeader) return;
  const width = Math.ceil(firstHeader.getBoundingClientRect().width);
  document.documentElement.style.setProperty('--sticky-col1-width', width + 'px');
}

function buildHeader() {
  const tr = document.getElementById("theadRow");
  tr.innerHTML = "";
  VISIBLE_HEADERS.forEach((h, i) => {
    const th = document.createElement("th");
    th.innerHTML = headerHtml(h);
    th.style.width = (WIDTHS[h] || 120) + "px";
    if (i === 0) th.classList.add("sticky-col-1");
    if (i === 1) th.classList.add("sticky-col-2");
    tr.appendChild(th);
  });

  const sort = document.getElementById("sortCol");
  sort.innerHTML = "";
  for (const h of VISIBLE_HEADERS) {
    const opt = document.createElement("option");
    opt.value = h;
    opt.textContent = h.replace(/_/g, " ");
    sort.appendChild(opt);
  }
  if (HEADERS.includes("PubId")) sort.value = "PubId";
  updateStickyColumns();
}
function rowMatches(row) {
  const aStart = normNoSpace(document.getElementById("authorStart").value);
  const aContains = normNoSpace(document.getElementById("authorContains").value);
  const tSearch = norm(document.getElementById("titleSearch").value);
  const sSearch = norm(document.getElementById("subjectSearch").value);

  const authors = row["AUTHORS"] ?? "";
  const mainAuthor = normNoSpace(getMainAuthor(authors));
  const allAuthors = normNoSpace(authors);

  if (aStart && !mainAuthor.startsWith(aStart)) return false;
  if (aContains && !allAuthors.includes(aContains)) return false;

  if (tSearch) {
    const titleCombined = norm((row["TITLE ORIGINAL"] ?? "") + " " + (row["TITLE ENGLISH TRANSLATED"] ?? ""));
    if (!titleCombined.includes(tSearch)) return false;
  }

  if (sSearch) {
    const subjectCombined = norm(SUBJECT_COLUMNS.map(c => row[c] ?? "").join(" "));
    if (!subjectCombined.includes(sSearch)) return false;
  }
  return true;
}
function compareRows(a,b,col,dir) {
  let av = a[col] ?? "";
  let bv = b[col] ?? "";

  if (col === "AUTHORS") {
    av = getMainAuthor(av);
    bv = getMainAuthor(bv);
  }

  const an = asNumber(av);
  const bn = asNumber(bv);
  let result;
  if (an !== null && bn !== null) {
    result = an - bn;
  } else {
    result = norm(av).localeCompare(norm(bv), "nl", {numeric: true, sensitivity: "base"});
  }
  return dir === "desc" ? -result : result;
}
function applyFilters() {
  const col = document.getElementById("sortCol").value;
  const dir = document.getElementById("sortDir").value;
  filtered = DATA.filter(rowMatches).sort((a,b) => compareRows(a,b,col,dir));
  page = 1;
  render();
}
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (page > totalPages) page = totalPages;
  const start = (page - 1) * PAGE_SIZE;
  const pageRows = filtered.slice(start, start + PAGE_SIZE);

  const frag = document.createDocumentFragment();
  for (const row of pageRows) {
    const tr = document.createElement("tr");
    tr.addEventListener("click", () => showDetails(row));
    VISIBLE_HEADERS.forEach((h, i) => {
      const td = document.createElement("td");
      td.style.width = (WIDTHS[h] || 120) + "px";
      if (h === "TITLE ORIGINAL" || h === "TITLE ENGLISH TRANSLATED" || h.startsWith("Subject_")) td.className = "wrap";
      if (h === "PubId" || h === "PUBLICTION YEAR" || h === "URL" || h === "DOI") td.classList.add("center");
      if (i === 0) td.classList.add("sticky-col-1");
      if (i === 1) td.classList.add("sticky-col-2");
      td.innerHTML = cellHtml(h, row[h]);
      tr.appendChild(td);
    });
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);

  document.getElementById("status").textContent =
    `${filtered.length.toLocaleString("nl-NL")} records gevonden · pagina ${page} van ${totalPages}`;

  renderPagination(totalPages);
  updateStickyColumns();
  document.getElementById("tableScroll").scrollTop = 0;
}
function renderPagination(totalPages) {
  const p = document.getElementById("pagination");
  p.innerHTML = "";
  const groupStart = Math.floor((page - 1) / 10) * 10 + 1;
  const groupEnd = Math.min(groupStart + 9, totalPages);

  if (groupStart > 1) {
    p.appendChild(pageButton("Previous", groupStart - 1));
  }
  for (let i = groupStart; i <= groupEnd; i++) {
    p.appendChild(pageButton(String(i), i, i === page));
  }
  if (groupEnd < totalPages) {
    p.appendChild(pageButton("next", groupEnd + 1));
  }
}
function pageButton(text, target, active=false) {
  const btn = document.createElement("button");
  btn.textContent = text;
  if (active) btn.className = "active";
  btn.addEventListener("click", () => { page = target; render(); });
  return btn;
}
function showDetails(row) {
  const title = row["TITLE ORIGINAL"] || row["TITLE ENGLISH TRANSLATED"] || "Publicatie details";
  document.getElementById("modalTitle").textContent = title;
  let html = `<table class="detail-table"><tbody>`;
  for (const h of HEADERS) {
    const val = row[h] ?? "";
    html += `<tr><th>${escapeHtml(h)}</th><td>${cellHtml(h, val)}</td></tr>`;
  }
  html += `</tbody></table>`;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modalBackdrop").style.display = "block";
}
function closeModal() {
  document.getElementById("modalBackdrop").style.display = "none";
}
function resetFilters() {
  document.getElementById("authorStart").value = "";
  document.getElementById("authorContains").value = "";
  document.getElementById("titleSearch").value = "";
  document.getElementById("subjectSearch").value = "";
  document.getElementById("sortCol").value = HEADERS.includes("PubId") ? "PubId" : VISIBLE_HEADERS[0];
  document.getElementById("sortDir").value = "asc";
  applyFilters();
}

buildHeader();
document.getElementById("applyBtn").addEventListener("click", applyFilters);
document.getElementById("resetBtn").addEventListener("click", resetFilters);
for (const id of ["authorStart","authorContains","titleSearch","subjectSearch"]) {
  document.getElementById(id).addEventListener("input", () => {
    clearTimeout(window.__filterTimer);
    window.__filterTimer = setTimeout(applyFilters, 180);
  });
}
document.getElementById("sortCol").addEventListener("change", applyFilters);
document.getElementById("sortDir").addEventListener("change", applyFilters);
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalBackdrop").addEventListener("click", e => {
  if (e.target.id === "modalBackdrop") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

resetFilters();
</script>
</body>
</html>
