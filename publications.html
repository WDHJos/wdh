<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Publications</title>

<style>
body { font-family: Arial, sans-serif; }

/* vaste zoekbalk */
#searchBox {
  position: sticky;
  top: 0;
  background: white;
  padding: 10px;
  z-index: 1001;
  border-bottom: 2px solid #ccc;
}

table {
  border-collapse: collapse;
  font-size: 12px;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: left;
  vertical-align: top;
  white-space: normal;
  overflow-wrap: break-word;
}

/* kolomhoofden vastzetten */
th {
  background: #f2f2f2;
  position: sticky;
  top: 50px; /* onder zoekbalk */
  z-index: 1000;
}

/* verticale headers */
th.vert {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  height: 110px;
  width: 36px;
  text-align: center;
}

/* kolombreedtes */
th:nth-child(1), td:nth-child(1) { width: 36px; }
th:nth-child(2), td:nth-child(2) { width: 260px; }
th:nth-child(3), td:nth-child(3) { width: 160px; }
th:nth-child(4), td:nth-child(4) { width: 45px; }
th:nth-child(5), td:nth-child(5) { width: 70px; }
th:nth-child(6), td:nth-child(6) { width: 160px; }
th:nth-child(7), td:nth-child(7) { width: 80px; }
th:nth-child(8), td:nth-child(8) { width: 80px; }

th:nth-child(n+9), td:nth-child(n+9) {
  width: 40px;
  text-align: center;
}

th:nth-child(17), td:nth-child(17) {
  width: 60px;
}

.table-container {
  overflow-x: auto;
}

/* hyperlink stijl */
a {
  color: blue;
  text-decoration: underline;
}
</style>

</head>
<body>

<h1>Publications</h1>

<div id="searchBox">
  <input type="text" id="search" placeholder="Search..." style="width:300px;">
</div>

<div class="table-container">

<table id="pubTable">

<tr>
  <th class="vert">PUB ID</th>
  <th>TITLE</th>
  <th>AUTHORS</th>
  <th>YEAR</th>
  <th>LANGUAGE</th>
  <th>SOURCE</th>
  <th>URL</th>
  <th>DOI</th>

  <th class="vert">TEXTFILE</th>
  <th class="vert">DATE IN</th>
  <th class="vert">REMARKS</th>
  <th class="vert">OVERALL</th>
  <th class="vert">DETERMINANT</th>
  <th class="vert">CONCEQUENCE</th>
  <th class="vert">HEDONIC</th>
  <th class="vert">CONTENT</th>
  <th class="vert">CONTS DATA</th>
</tr>

<!-- HIER PLAK JE JE EXCEL REGELS -->

</table>
</div>

<script>

/* URL klikbaar maken */
function makeLinks() {
  const table = document.getElementById("pubTable");
  const rows = table.querySelectorAll("tr");

  rows.forEach((row, i) => {
    if (i === 0) return;

    let urlCell = row.children[6]; // URL kolom
    if (!urlCell) return;

    let url = urlCell.textContent.trim();

    if (url.startsWith("http")) {
      urlCell.innerHTML = '<a href="' + url + '" target="_blank">link</a>';
    }
  });
}

makeLinks();

/* zoekfunctie */
document.getElementById("search").addEventListener("keyup", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#pubTable tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(filter) ? "" : "none";
  });
});
</script>

</body>
</html>
