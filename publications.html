<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Publications</title>
  <link rel="stylesheet" href="style.css">

  <style>
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: left;
    vertical-align: top;
  }

  th {
    position: sticky;
    top: 0;
    background: #f2f2f2;
  }

  /* Tekst netjes afbreken */
  td {
    max-width: 250px;
    word-wrap: break-word;
    white-space: normal;
  }

  /* Titel kolom breder */
  td:nth-child(2) {
    max-width: 400px;
  }

  /* Horizontale scroll */
  #table {
    display: block;
    overflow-x: auto;
  }
  </style>

</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="bibliography.html">Bibliography</a>
  <a href="publications.html">Publications</a>
</nav>

<h1>Publications</h1>

<input type="text" id="search" placeholder="Search publications...">

<table id="table"></table>

<script>
let tableData = [];

fetch("publications.csv")
  .then(response => response.text())
  .then(text => {

    const delimiter = text.includes(";") ? ";" : ",";

    const lines = text.trim().split("\n");

    const rows = lines.map(line => {
      return line.split(delimiter).map(cell => cell.replace(/^"|"$/g, ""));
    });

    const headers = rows[0];
    tableData = rows.slice(1);

    renderTable(headers, tableData);

    document.getElementById("search").addEventListener("keyup", function() {
      const value = this.value.toLowerCase();
      const filtered = tableData.filter(row =>
        row.join(" ").toLowerCase().includes(value)
      );
      renderTable(headers, filtered);
    });

  });

function renderTable(headers, rows) {
  let html = "<tr>";

  headers.forEach(h => html += "<th>" + h + "</th>");
  html += "</tr>";

  rows.forEach(row => {
    html += "<tr>";
    row.forEach(cell => {
      html += "<td>" + cell + "</td>";
    });
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
}
</script>

</body>
</html>
