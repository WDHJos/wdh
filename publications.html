<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>WDH Bibliografie</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

header {
  background:#002b5c;
  color:white;
  padding:20px;
}

.container { padding:20px; }

/* zoekbalk blijft staan */
.searchbar {
 position:sticky;
 top:0;
 background:#f4f6f8;
 padding:10px 0;
 z-index:10;
}

input { padding:10px; width:400px; }

/* tabel */
table {
  border-collapse:collapse;
  width:100%;
  background:white;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  font-size:12px;
  white-space:normal;
  word-wrap:break-word;
}

/* kolomhoofden blijven staan */
th {
  background:#e9eef3;
  position:sticky;
  top:60px;
}

/* hover */
tr:hover {
  background:#f1f5f9;
  cursor:pointer;
}

/* popup */
#popup {
 display:none;
 position:fixed;
 top:5%;
 left:10%;
 width:80%;
 height:90%;
 background:white;
 border:2px solid #333;
 overflow:auto;
 padding:20px;
 z-index:1000;
}

.overlay {
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.4);
 z-index:999;
}
</style>
</head>

<body>

<header>
<h1>World Database of Happiness – Publications</h1>
</header>

<div class="container">

<div class="searchbar">
<input id="search" placeholder="Search...">
</div>

<table>
<thead>
<tr>
<th>PUB ID</th>
<th>TITLE</th>
<th>ID MAIN AUTHOR</th>
<th>AUTHORS</th>
<th>YEAR PUB</th>
<th>LANGUAGE</th>
<th>SOURCE</th>
<th>URL</th>
<th>DOI</th>
<th>TEXTFILE</th>
<th>DATE IN</th>
<th>REMARKS</th>
<th>DETERMINANT</th>
<th>CONCEQUENCE</th>
<th>HEDONIC</th>
<th>CONTENT</th>
<th>CONTAINS DATA</th>
<th>SUBJECT_1</th>
<th>SUBJECT_2</th>
<th>SUBJECT_3</th>
<th>SUBJECT_4</th>
<th>SUBJECT_5</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

</div>

<div class="overlay" id="overlay"></div>
<div id="popup"></div>

<script>

/* === HIER KOMT JOUW DATA === */
let data = [
{"PUB ID":"1","TITLE":"Test titel","ID MAIN AUTHOR":"1","AUTHORS":"Auteur","YEAR PUB":"2024","LANGUAGE":"EN","SOURCE":"Test source","URL":"https://example.com","DOI":"","TEXTFILE":"","DATE IN":"","REMARKS":"","DETERMINANT":"FALSE","CONCEQUENCE":"TRUE","HEDONIC":"FALSE","CONTENT":"FALSE","CONTAINS DATA":"FALSE","SUBJECT_1":"","SUBJECT_2":"","SUBJECT_3":"","SUBJECT_4":"","SUBJECT_5":""}
];

/* === TABEL OPBOUW === */
function renderTable(list) {
  const body = document.getElementById("body");
  body.innerHTML = "";

  list.forEach((row, index) => {
    let tr = document.createElement("tr");

    Object.keys(row).forEach(key => {
      let td = document.createElement("td");

      let value = row[key];

      // URL klikbaar maken
      if (key === "URL" && value.startsWith("http")) {
        td.innerHTML = `<a href="${value}" target="_blank">link</a>`;
      } else {
        td.textContent = value;
      }

      tr.appendChild(td);
    });

    tr.onclick = () => showDetail(row);
    body.appendChild(tr);
  });
}

/* === DETAIL POPUP === */
function showDetail(row) {
  let html = "<h2>Detail</h2><table>";

  Object.keys(row).forEach(key => {
    html += `<tr><th>${key}</th><td>${row[key]}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("popup").innerHTML = html;
  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

document.getElementById("overlay").onclick = function() {
  document.getElementById("popup").style.display = "none";
  this.style.display = "none";
};

/* === ZOEKFUNCTIE === */
document.getElementById("search").addEventListener("keyup", function() {
  const filter = this.value.toLowerCase();

  const filtered = data.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(filter)
  );

  renderTable(filtered);
});

/* eerste keer laden */
renderTable(data);

</script>

</body>
</html>
