<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Publications</title>

<style>
body {
  font-family: Arial;
}

table {
  border-collapse: collapse;
  font-size: 12px;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: left;
  vertical-align: top;
  white-space: normal;
  overflow-wrap: break-word;
}

th {
  background: #f2f2f2;
  position: sticky;
  top: 0;
}

/* verticale PUB ID */
th.vert {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  height: 110px;
  width: 35px;
  text-align: center;
  padding: 2px;
}

/* kolombreedtes exact gestuurd */
th:nth-child(1), td:nth-child(1) { width: 35px; }   /* PUB ID */
th:nth-child(2), td:nth-child(2) { width: 260px; }  /* TITLE */
th:nth-child(3), td:nth-child(3) { width: 160px; }  /* AUTHORS */
th:nth-child(4), td:nth-child(4) { width: 50px; }   /* YEAR */
th:nth-child(5), td:nth-child(5) { width: 75px; }   /* LANGUAGE */
th:nth-child(6), td:nth-child(6) { width: 160px; }  /* SOURCE */
th:nth-child(7), td:nth-child(7) { width: 55px; }   /* URL */
th:nth-child(8), td:nth-child(8) { width: 55px; }   /* DOI */
th:nth-child(9), td:nth-child(9) { width: 80px; }   /* TEXTFILE */
th:nth-child(10), td:nth-child(10) { width: 80px; } /* DATE IN */
th:nth-child(11), td:nth-child(11) { width: 120px; }/* REMARKS */
th:nth-child(12), td:nth-child(12) { width: 50px; } /* DET */
th:nth-child(13), td:nth-child(13) { width: 50px; } /* CON */
th:nth-child(14), td:nth-child(14) { width: 50px; } /* HED */
th:nth-child(15), td:nth-child(15) { width: 50px; } /* CONTENT */
th:nth-child(16), td:nth-child(16) { width: 50px; } /* DATA */

/* scroll */
.table-container {
  overflow-x: auto;
}

/* popup */
#popup {
  display: none;
  position: fixed;
  top: 10%;
  left: 10%;
  width: 80%;
  max-height: 80%;
  overflow: auto;
  background: white;
  border: 2px solid black;
  padding: 20px;
  z-index: 1000;
}

#overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}
</style>

</head>
<body>

<nav>
  <a href="index.html">Home</a> |
  <a href="bibliography.html">Bibliography</a> |
  <a href="publications.html">Publications</a>
</nav>

<h1>Publications</h1>

<input type="text" id="search" placeholder="Search...">

<br><br>

<div class="table-container">

<table id="pubTable">

<tr>
  <th class="vert">PUB ID</th>
  <th>TITLE</th>
  <th>AUTHORS</th>
  <th>YEAR</th>
  <th>LANGUAGE</th>
  <th>SOURCE</th>
  <th>URL</th>
  <th>DOI</th>
  <th>TEXTFILE</th>
  <th>DATE IN</th>
  <th>REMARKS</th>
  <th>DET</th>
  <th>CON</th>
  <th>HED</th>
  <th>CONTENT</th>
  <th>DATA</th>
</tr>

<tr onclick="showDetail(0)">
  <td>1</td>
  <td>Glücksvorstellungen: Ein Rückgriff in die Geschichte der Soziologie</td>
  <td>Bellebaum, A.</td>
  <td>2000</td>
  <td>German</td>
  <td>Example Source</td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
</tr>

</table>

</div>

<div id="overlay" onclick="closePopup()"></div>

<div id="popup">
  <button onclick="closePopup()">Close</button>
  <div id="detailContent"></div>
</div>

<script>

const data = [
{
  "PUB ID": "1",
  "TITLE": "Glücksvorstellungen: Ein Rückgriff in die Geschichte der Soziologie",
  "AUTHORS": "Bellebaum, A.",
  "YEAR PUB": "2000",
  "LANGUAGE": "German",
  "SOURCE": "Example Source",
  "URL": "",
  "DOI": "",
  "TEXTFILE": "",
  "DATE IN": "",
  "REMARKS": "",
  "DETERMINANT": "",
  "CONCEQUENCE": "",
  "HEDONIC": "",
  "CONTENT": "",
  "CONTAINS DATA": "",
  "Subject_1": "",
  "Subject_2": ""
}
];

function showDetail(index) {
  const row = data[index];

  let html = "<table>";

  for (let key in row) {
    html += "<tr><th>" + key + "</th><td>" + (row[key] || "") + "</td></tr>";
  }

  html += "</table>";

  document.getElementById("detailContent").innerHTML = html;
  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

document.getElementById("search").addEventListener("keyup", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#pubTable tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(filter) ? "" : "none";
  });
});

</script>

</body>
</html>
