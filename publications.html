<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Publications</title>

<style>
body { font-family: Arial, sans-serif; }

table {
  border-collapse: collapse;
  font-size: 12px;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: left;
  vertical-align: top;
  white-space: normal;
  overflow-wrap: break-word;
}

/* header */
th {
  background: #f2f2f2;
  position: sticky;
  top: 0;
  z-index: 2;
}

/* verticale headers (boven→beneden) */
th.vert {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  height: 110px;
  width: 36px;
  text-align: center;
  vertical-align: middle;
  padding: 2px;
}

/* kolombreedtes */
th:nth-child(1),  td:nth-child(1)  { width: 36px; }  /* PUB ID (vert) */
th:nth-child(2),  td:nth-child(2)  { width: 260px; } /* TITLE */
th:nth-child(3),  td:nth-child(3)  { width: 160px; } /* AUTHORS */
th:nth-child(4),  td:nth-child(4)  { width: 45px; }  /* YEAR (past "YEAR"/2000) */
th:nth-child(5),  td:nth-child(5)  { width: 70px; }  /* LANGUAGE (≈ German) */
th:nth-child(6),  td:nth-child(6)  { width: 160px; } /* SOURCE */
th:nth-child(7),  td:nth-child(7)  { width: 55px; }  /* URL */
th:nth-child(8),  td:nth-child(8)  { width: 55px; }  /* DOI */

/* laatste 8 kolommen (compact + verticaal) */
th:nth-child(n+9), td:nth-child(n+9) {
  width: 40px;
  text-align: center;
}

/* scroll */
.table-container { overflow-x: auto; }

/* popup */
#popup {
  display: none;
  position: fixed;
  top: 10%;
  left: 10%;
  width: 80%;
  max-height: 80%;
  overflow: auto;
  background: #fff;
  border: 2px solid #000;
  padding: 16px;
  z-index: 1000;
}

#overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 999;
}
</style>

</head>
<body>

<nav>
  <a href="index.html">Home</a> |
  <a href="bibliography.html">Bibliography</a> |
  <a href="publications.html">Publications</a>
</nav>

<h1>Publications</h1>

<input type="text" id="search" placeholder="Search...">
<br><br>

<div class="table-container">
<table id="pubTable">

<tr>
  <th class="vert">PUB ID</th>
  <th>TITLE</th>
  <th>AUTHORS</th>
  <th>YEAR</th>
  <th>LANGUAGE</th>
  <th>SOURCE</th>
  <th>URL</th>
  <th>DOI</th>

  <!-- laatste 8 kolommen verticaal -->
  <th class="vert">TEXTFILE</th>
  <th class="vert">DATE IN</th>
  <th class="vert">REMARKS</th>
  <th class="vert">OVERALL</th>
  <th class="vert">DETERMINANT</th>
  <th class="vert">CONCEQUENCE</th>
  <th class="vert">HEDONIC</th>
  <th class="vert">CONTENT</th>
</tr>

<tr onclick="showDetail(0)">
  <td>1</td>
  <td>Glücksvorstellungen: Ein Rückgriff in die Geschichte der Soziologie</td>
  <td>Bellebaum, A.</td>
  <td>2000</td>
  <td>German</td>
  <td>Example Source</td>
  <td></td>
  <td></td>

  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
  <td></td>
</tr>

</table>
</div>

<!-- popup -->
<div id="overlay" onclick="closePopup()"></div>

<div id="popup">
  <button onclick="closePopup()">Close</button>
  <div id="detailContent"></div>
</div>

<script>
const data = [
{
  "PUB ID": "1",
  "TITLE": "Glücksvorstellungen: Ein Rückgriff in die Geschichte der Soziologie",
  "AUTHORS": "Bellebaum, A.",
  "YEAR PUB": "2000",
  "LANGUAGE": "German",
  "SOURCE": "Example Source",
  "URL": "",
  "DOI": "",
  "TEXTFILE": "",
  "DATE IN": "",
  "REMARKS": "",
  "OVERALL": "",
  "DETERMINANT": "",
  "CONCEQUENCE": "",
  "HEDONIC": "",
  "CONTENT": "",
  "CONTAINS DATA": "",
  "Subject_1": "",
  "Subject_2": "",
  "Subject_3": "",
  "Subject_4": "",
  "Subject_5": "",
  "Subject_6": "",
  "Subject_7": "",
  "Subject_8": "",
  "Subject_9": "",
  "Subject_10": "",
  "Control_Subject_1": ""
}
];

function showDetail(index) {
  const row = data[index];
  let html = "<table>";

  for (let key in row) {
    html += "<tr><th>" + key + "</th><td>" + (row[key] || "") + "</td></tr>";
  }

  html += "</table>";
  document.getElementById("detailContent").innerHTML = html;
  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

document.getElementById("search").addEventListener("keyup", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#pubTable tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(filter) ? "" : "none";
  });
});
</script>

</body>
</html>
