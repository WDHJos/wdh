<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Publications</title>
  <link rel="stylesheet" href="style.css">
  <style>
    table {
      display: block;
      overflow-x: auto;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="bibliography.html">Bibliography</a>
  <a href="publications.html">Publications</a>
</nav>

<h1>Publications</h1>

<input type="text" id="search" placeholder="Search publications...">

<table id="table"></table>

<script>
let tableData = [];

fetch("publications.csv")
  .then(response => response.text())
  .then(text => {

    // automatisch delimiter bepalen (; of ,)
    const delimiter = text.includes(";") ? ";" : ",";

    const rows = text.trim().split("\n").map(row => row.split(delimiter));

    const headers = rows[0];
    tableData = rows.slice(1);

    renderTable(headers, tableData);

    document.getElementById("search").addEventListener("keyup", function() {
      const value = this.value.toLowerCase();
      const filtered = tableData.filter(row =>
        row.join(" ").toLowerCase().includes(value)
      );
      renderTable(headers, filtered);
    });

  });

function renderTable(headers, rows) {
  let html = "<tr>";

  headers.forEach(header => {
    html += "<th>" + header + "</th>";
  });

  html += "</tr>";

  rows.forEach(row => {
    html += "<tr>";
    row.forEach(cell => {
      html += "<td>" + cell + "</td>";
    });
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
}
</script>

</body>
</html>
