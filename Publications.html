<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>WDH Publications</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

header { background:#002b5c; color:white; padding:20px; }

/* horizontal menu under header */
.menu {
 background:#cfe8ff;
 padding:10px;
 display:flex;
 gap:20px;
}

.menu a {
 text-decoration:none;
 color:#003366;
 font-weight:bold;
}

.container { padding:20px; }

.searchbar {
 position:sticky;
 top:0;
 background:#f4f6f8;
 padding:10px 0;
 z-index:10;
}

input { padding:10px; width:400px; }

table { border-collapse:collapse; width:100%; background:white; }
th, td { border:1px solid #ccc; padding:6px; font-size:12px; }
th { background:#e9eef3; position:sticky; top:60px; white-space:normal; }

.small { width:60px; text-align:center; }
.link { width:90px; text-align:center; }

tr:hover { background:#f1f5f9; cursor:pointer; }

#pagination { margin-top:10px; }
button { padding:6px 10px; margin:2px; }

#popup {
 display:none;
 position:fixed;
 top:5%;
 left:10%;
 width:80%;
 height:90%;
 background:white;
 border:2px solid #333;
 overflow:auto;
 padding:20px;
 z-index:1000;
}

.overlay {
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.4);
 z-index:999;
}
</style>
</head>

<body>

<header>
<h1>World Database of Happiness – Publications</h1>
</header>

<div class="menu">
<a href="index.html">Home</a>
<a href="bibliography.html">Bibliography</a>
<a href="publications.html">Publications</a>
</div>

<div class="container">

<div class="searchbar">
<input id="search" placeholder="Zoek...">
</div>

<table>
<thead id="thead"></thead>
<tbody id="body"></tbody>
</table>

<div id="pagination"></div>

</div>

<div class="overlay" id="overlay"></div>
<div id="popup"></div>

<script>

// demo data
let data = [
 {TITLE:"Test publication", Authors:"A", YR:"2021", OVERALL:"7", URL:"https://example.com"}
];

let headers = Object.keys(data[0]);

document.getElementById("thead").innerHTML =
"<tr>" + headers.map(h => "<th>" + h + "</th>").join("") + "</tr>";

let page = 1;
let pageSize = 50;
let filtered = data;

function render(){
 let start = (page-1)*pageSize;
 let list = filtered.slice(start, start+pageSize);

 let b = document.getElementById("body");
 b.innerHTML="";

 list.forEach(item=>{
  let tr = document.createElement("tr");
  tr.innerHTML = headers.map(h=>{
    if(h==="URL") return `<td class='link'><a href="${item[h]}" target="_blank">link</a></td>`;
    if(h==="YR"||h==="OVERALL") return `<td class='small'>${item[h]}</td>`;
    return `<td>${item[h]}</td>`;
  }).join("");
  tr.onclick=()=>show(item);
  b.appendChild(tr);
 });

 renderPagination();
}

function renderPagination(){
 let total = Math.ceil(filtered.length/pageSize);
 let p = document.getElementById("pagination");
 p.innerHTML="";
 for(let i=1;i<=total;i++){
  let btn=document.createElement("button");
  btn.textContent=i;
  btn.onclick=()=>{page=i; render();};
  p.appendChild(btn);
 }
}

function show(item){
 let p=document.getElementById("popup");
 let o=document.getElementById("overlay");

 p.innerHTML =
 "<button onclick='closePopup()'>Sluiten</button>" +
 headers.map(h=>"<p><b>"+h+":</b> "+item[h]+"</p>").join("");

 p.style.display="block";
 o.style.display="block";
}

function closePopup(){
 document.getElementById("popup").style.display="none";
 document.getElementById("overlay").style.display="none";
}

document.getElementById("search").oninput=function(){
 let v=this.value.toLowerCase();
 filtered=data.filter(x=>Object.values(x).join(" ").toLowerCase().includes(v));
 page=1;
 render();
}

render();

</script>

</body>
</html>
